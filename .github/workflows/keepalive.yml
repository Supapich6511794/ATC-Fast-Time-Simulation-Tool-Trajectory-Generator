# Keep the Render free-tier API awake.
#
# Render spins a free service down after ~15 min with no traffic; the next
# request then pays a ~30-60 s cold start. This workflow pings the health
# endpoint every ~10 min so the service never reaches the idle threshold.
#
# Note: GitHub disables scheduled workflows if the repo has had no activity
# for 60 days — fine for an actively developed project. Adjust API_URL if
# the Render service URL changes.

name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        env:
          API_URL: https://trajectory-api-zf51.onrender.com/api/health
        # Render free-tier cold starts routinely overshoot 60 s, so a
        # single short curl exits 28 (timeout) whenever the cron missed a
        # window and the service slept. We try up to 3 times with 180 s
        # per attempt; any 200 wins, since the goal is to *wake* the
        # service, not to assert availability on the very first probe.
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                        --max-time 180 --connect-timeout 15 \
                        "$API_URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "::warning::API never returned 200 after 3 attempts; last status $code"
          exit 1
